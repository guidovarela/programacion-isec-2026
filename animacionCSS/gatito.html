<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Animacion CSS</title>
	<style>
	body{
		margin: 0;
		/* opacity: 0.1; */
		/* animation: 2s entrada2; */
	}
	/*Animaciones*/	
	/*1ero) definimos la animacion*/	
		@keyframes entrada {
			/* progreso 0%-100% from-to */
			0%{opacity: 1;}
			100%{opacity: 0;}
		}
		@keyframes entrada2 {
			/* progreso 0%-100% from-to */
			0%{transform: translateY(-1000px);}
			100%{transform: translateY(0);}
		}
		@keyframes giro1 {
			/* progreso 0%-100% from-to */
			0%{transform: rotate(0);}
			100%{transform: rotate(1turn);}
		}




	.caja {
		border:2px solid #000;
		position:relative;
		display: inline-block;
		line-height: 0;
		border-radius: 10px;
		overflow:hidden;
		animation-name: entrada2;
		animation-duration: 4s;
		animation-timing-function: ease;
		animation-iteration-count: 2;


	}
	.img{
		transition: 2s;
	}
	.img:hover{
		transform: scale(1.1) rotate(-5deg);
	}

	.descripcion {
		position:absolute;
		bottom:-20%;
		left:0;
		right:0;
		background: rgba(0,0,0,0.3);
		color:black;
		padding:8px;
		line-height: normal;
		opacity: 0;
	}
	.titulo{
		position: absolute;
		top: -20%;
		transition: 1s;
	}

	.rojo{
		cursor: pointer;
		position: relative;
		width: 100px;
		height: 100px;
		background: red;
		transition-duration: 1s;
		/* transition-delay:2s; */
		/* transition-property: all; */
	}
	/* transicion */
	.rojo:active,.rojo:hover{
		background: teal;
		width: 500px;
	}


</style>
</head>
<body>
	<div class="rojo"></div>

<hr>

	<div class="caja">
		<div class="titulo">
			<h2>Soy un Gato</h2>
		</div>
		<div class="img">
			<img src="gatito.jpg">
		</div>
		<div class="descripcion">Descripción del gatito. Aaaawwwwnnn... </div> 
	</div>



</body>
</html>
